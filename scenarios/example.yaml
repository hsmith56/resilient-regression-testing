create-basic-incident:
  - create basic incident:
      create-inc:
        name: Basic Created Incident
        description: Verifies the mock runner can create an incident
  - validate:
      id:
        exists: true
      name: Basic Created Incident

allow-failure-known-broken-name:
  allow_failure: true
  steps:
    - create incident with current incorrect name:
        create-inc:
          name: Known Broken Incident
    - validate:
        name: Expected Different Name

update-properties-and-type-check:
  - create incident with initial properties and type:
      create-inc:
        name: Property Validation Incident
        description: Regression test for incident property updates
        properties.field_1: field_1_val
        properties.field_2: field_2_val
        type_ids:
          - expected_incident_type_val
  - wait before updating incident without sleeping in dry-run:
      wait-before-run: 10 sec
      update-inc:
        properties.field_3: field_3_val
        properties.field_5: expected_val_field_5
  - validate:
      properties.field_1: field_1_val
      properties.field_5: expected_val_field_5
      incident.type_ids:
        contains: expected_incident_type_val
